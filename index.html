<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>speedybits · Projects</title>
  <meta name="description" content="Projects by speedybits — robotics, AI, games, and web apps.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0e14;
      --bg-elev: #131823;
      --bg-card: #161c2a;
      --bg-card-hover: #1c2436;
      --border: #263048;
      --border-hover: #3a4a6a;
      --text: #e6ebf5;
      --text-dim: #9aa7bf;
      --text-faint: #64708a;
      --accent: #6ea8fe;
      --accent-2: #a78bfa;
      --accent-glow: rgba(110, 168, 254, 0.15);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(900px 500px at 15% -10%, rgba(110,168,254,0.10), transparent 60%),
        radial-gradient(800px 500px at 100% 0%, rgba(167,139,250,0.10), transparent 55%);
      min-height: 100vh;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

    /* Header */
    header { padding: 88px 0 40px; }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; letter-spacing: 0.04em;
      color: var(--accent); margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(38px, 7vw, 62px);
      font-weight: 800; letter-spacing: -0.02em; line-height: 1.05;
      background: linear-gradient(135deg, #fff 20%, var(--accent) 70%, var(--accent-2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .lede {
      margin-top: 20px; max-width: 640px;
      font-size: 18px; color: var(--text-dim);
    }
    .header-links { margin-top: 26px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 10px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      border: 1px solid var(--border); color: var(--text);
      background: var(--bg-elev); transition: all .18s ease;
    }
    .btn:hover { border-color: var(--accent); background: var(--bg-card-hover); transform: translateY(-1px); }
    .btn svg { width: 17px; height: 17px; }

    /* Controls */
    .controls {
      position: sticky; top: 0; z-index: 20;
      padding: 18px 0; margin-bottom: 8px;
      background: rgba(11,14,20,0.82);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .controls-inner { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .search {
      flex: 1; min-width: 220px; position: relative;
    }
    .search input {
      width: 100%; padding: 11px 14px 11px 40px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px;
      font-family: inherit; outline: none; transition: border-color .18s;
    }
    .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--text-faint); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 8px 14px; border-radius: 999px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-dim); transition: all .16s ease; user-select: none;
    }
    .chip:hover { color: var(--text); border-color: var(--border-hover); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #08101f; }

    .count { color: var(--text-faint); font-size: 13px; padding: 4px 0 20px; font-family: 'JetBrains Mono', monospace; }

    /* Grid */
    .grid {
      display: grid; gap: 18px; padding-bottom: 80px;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
    .card {
      position: relative; display: flex; flex-direction: column;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      text-decoration: none; color: inherit;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; inset: 0; border-radius: var(--radius);
      padding: 1px; background: linear-gradient(135deg, transparent, transparent);
      opacity: 0; transition: opacity .2s;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    a.card:hover { transform: translateY(-4px); border-color: var(--border-hover); background: var(--bg-card-hover); }
    a.card:hover::before { opacity: 1; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .card h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
    .card h3 .arrow { opacity: 0; transition: opacity .18s, transform .18s; color: var(--accent); }
    a.card:hover h3 .arrow { opacity: 1; transform: translate(2px,-2px); }
    .badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.03em;
      padding: 3px 9px; border-radius: 999px; white-space: nowrap;
      background: rgba(167,139,250,0.14); color: var(--accent-2);
      border: 1px solid rgba(167,139,250,0.3);
    }
    .card p { color: var(--text-dim); font-size: 14.5px; flex: 1; }
    .card p.placeholder { color: var(--text-faint); font-style: italic; }
    .card-foot { display: flex; align-items: center; gap: 14px; margin-top: 18px; font-size: 13px; color: var(--text-faint); flex-wrap: wrap; }
    .lang { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; color: var(--text-dim); }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .stars { display: inline-flex; align-items: center; gap: 4px; }
    .cat-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: auto; color: var(--text-faint); }

    footer { border-top: 1px solid var(--border); padding: 34px 0 60px; color: var(--text-faint); font-size: 14px; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-faint); }

    /* View toggle */
    .view-toggle { display: inline-flex; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
    .vt-btn { font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text-dim); background: transparent; border: none; cursor: pointer; padding: 8px 14px; border-radius: 7px; transition: all .16s ease; white-space: nowrap; }
    .vt-btn:hover { color: var(--text); }
    .vt-btn.active { background: var(--accent); color: #08101f; }

    /* Year nav (timeline mode) */
    .yearnav {
      position: sticky; top: 79px; z-index: 15;
      display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 0 12px;
      background: rgba(11,14,20,0.86); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); margin-bottom: 6px;
    }
    .yr-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 999px; cursor: pointer;
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim);
      transition: all .16s ease; user-select: none;
    }
    .yr-pill:hover { color: var(--text); border-color: var(--border-hover); }
    .yr-pill.active { background: var(--accent); border-color: var(--accent); color: #08101f; }

    /* Timeline */
    .timeline { position: relative; padding: 6px 0 80px; }
    .timeline::before {
      content: ""; position: absolute; left: 20px; top: 8px; bottom: 40px; width: 2px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2)); opacity: .4;
    }
    .tl-year { display: flex; align-items: center; gap: 14px; margin: 34px 0 20px; scroll-margin-top: 150px; }
    .tl-year:first-child { margin-top: 8px; }
    .tl-year .yr {
      font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: var(--text);
      background: var(--bg); padding: 0 12px 0 44px; position: relative; z-index: 2;
    }
    .tl-year .yr-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-faint); white-space: nowrap; }
    .tl-year .yr-line { flex: 1; height: 1px; background: var(--border); }

    .tl-item {
      position: relative; margin: 0 0 16px 52px;
      opacity: 0; transform: translateY(18px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .tl-item.in { opacity: 1; transform: none; }
    .tl-item::before {
      content: ""; position: absolute; left: -39px; top: 30px;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--accent);
      box-shadow: 0 0 0 4px var(--bg); z-index: 1; transition: all .2s ease;
    }
    .tl-item:has(> a:hover)::before { border-color: var(--accent-2); box-shadow: 0 0 0 4px var(--bg), 0 0 14px var(--accent); }
    .tl-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); margin-bottom: 8px; letter-spacing: 0.02em; }
    .tl-card { width: 100%; }
    @media (prefers-reduced-motion: reduce) {
      .tl-item { opacity: 1; transform: none; transition: none; }
    }

    @media (max-width: 560px) {
      header { padding: 60px 0 30px; }
      .grid { grid-template-columns: 1fr; }
      .controls-inner { gap: 10px; }
      .view-toggle { width: 100%; }
      .vt-btn { flex: 1; }
      .yearnav { top: 72px; }
      .tl-year .yr { font-size: 20px; padding-left: 40px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">$ ls ~/projects</div>
      <h1>speedybits</h1>
      <p class="lede">A collection of things I've built — robotics &amp; embedded systems, AI &amp; voice assistants, games, and web apps. <span id="pubcount"></span></p>

  <div class="controls">
    <div class="wrap controls-inner">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search" type="text" placeholder="Search projects…" autocomplete="off">

      <div class="filters" id="filters"></div>
      <div class="view-toggle" id="viewToggle" role="tablist" aria-label="View mode">
        <button class="vt-btn active" data-view="grid" role="tab" aria-selected="true">▦&nbsp;Grid</button>
        <button class="vt-btn" data-view="timeline" role="tab" aria-selected="false">◷&nbsp;Timeline</button>
      </div>

  </div>

  <div class="wrap">
    <div class="yearnav" id="yearnav" hidden></div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="timeline" id="timeline" hidden></div>
  </div>

  <div class="wrap">
    <footer>
      Built by speedybits · Hosted on GitHub Pages · <a href="https://github.com/speedybits" target="_blank" rel="noopener">github.com/speedybits</a>
      <br><span style="color:var(--text-faint)">Edit the <code>projects</code> array in <code>index.html</code> to update this page.</span>

  <script>
    // ────────────────────────────────────────────────────────────────
    //  PROJECT DATA — edit here to update the page.
    //  Fields: name, desc, lang, stars, category, url (omit/empty = private → shows "Private" badge)
    //  `inferred: true` marks descriptions I guessed — please review/rewrite these.
    // ────────────────────────────────────────────────────────────────
    const projects = [
      { name: "couchworthy", lang: "TypeScript", stars: 0, category: "Web Apps",
        desc: "Couchworthy is a US-only SaaS web app that gives personalized TV and movie recommendations for groups of one to four people watching together. Its differentiator is the quality of the explanation: a paragraph telling the group specifically why they'll like a given pick. Built on Next.js 15, Postgres, and Anthropic Claude, with an owned catalog sourced from Wikidata and Wikipedia plus on-device embeddings." },
      { name: "rosiecloud", lang: "TypeScript", stars: 0, category: "AI & Voice",
        desc: "RosieCloud is a privacy-first AI chat app that anonymizes your text locally, in the browser, before it ever reaches an AI provider. On-device NER detects names, locations, and medical or financial details and swaps them for deterministic aliases, so the model only ever sees 'Person_A' or 'Doctor_1'; replies are then rehydrated with your real data, which stays encrypted on your device. It runs Claude, GPT-4o, and Gemini behind the same anonymizing layer." },
      { name: "clutterbucks", lang: "TypeScript", stars: 1, category: "Web Apps",
        desc: "ClutterBucks is a mobile-first PWA for decluttering: photograph an item and AI vision identifies it, estimates its resale value, recommends the best selling platform based on value thresholds, and generates optimized listing content. Built with Next.js, Prisma/Postgres, Clerk, and the Anthropic Claude vision API, deployed on Railway." },
      { name: "escapecall", lang: "JavaScript", stars: 1, category: "Web Apps",
        desc: "EscapeCall lets you trigger a real phone call to yourself with a single tap, from an Apple Watch complication or an iPhone Back Tap gesture, so your phone rings seconds later with an authentic incoming call and a realistic AI voice when you answer. Unlike fake-call apps that just play audio, it places an actual call through telecom infrastructure, so it rings for real and shows up in your call log: a graceful exit from bad dates, long meetings, or awkward situations." },
      { name: "casualquest", lang: "TypeScript", stars: 0, category: "Games",
        desc: "CasualQuest is a web-based 'casual Dungeons & Dragons' platform that removes the friction from tabletop RPGs using an AI Dungeon Master, voice narration, and per-scene image generation. The shared story plays out on a main screen (TV, PC, or iPad) while players join and act from their phones; D&D 5e rules run silently under the hood, so players see only narrated outcomes. An optional battle-map view renders a tactical grid compatible with physical miniatures." },
      { name: "cc_qa", lang: "TypeScript", stars: 0, category: "Dev Tools",
        desc: "claude-skill-e2e-playwright is a shared end-to-end testing toolkit for Next.js + Prisma + Clerk + Railway SaaS apps. Dropped into a project as a git submodule, it provides a working Playwright setup, Clerk sign-in, Railway database wiring, and a small CLI (e2e init, e2e run). It is built around one contract: new features ship behind a beta-user gate with a Playwright spec that proves they work, graduating to real users only once the test is green." },
      { name: "borderline_web", lang: "JavaScript", stars: 1, category: "Games",
        desc: "A web version of Mike and Sean's Borderline, a two-player strategy game where each side places patterned pieces to build a connected pip path from their home row across an 8x6 board to the opponent's side. This implementation adds a multiplayer server, combat cards, and a human-vs-AI mode." },
      { name: "nimbus", lang: "Python", stars: 1, category: "Robotics", url: "https://github.com/speedybits/nimbus",
        desc: "Nimbus is a lightweight robot control platform that replaces heavy ROS 2 navigation stacks with a minimal, pure-Python implementation. It talks directly to an ESP32 over XRCE-DDS (no ROS 2, no Docker), offering reactive obstacle avoidance, a hardware safety layer that cannot be bypassed, a rich terminal dashboard, and REST + WebSocket APIs for Home Assistant, custom dashboards, or AI integration. Its test suite runs entirely without hardware." },
      { name: "rosie", lang: "Python", stars: 1, category: "AI & Voice",
        desc: "Rosie is a local-first voice AI assistant: no cloud APIs, no subscriptions, and no data leaving your machine. It runs entirely on local models (Ollama for the LLM, Piper for speech) and supports both voice and text modes, with an optional RAG knowledge base and interruption handling." },
      { name: "b4m_yahboom", lang: "Python", stars: 3, category: "Robotics", url: "https://github.com/speedybits/b4m_yahboom",
        desc: "ROS 2 packages for the Yahboom robot, part of the Bike4Mind ('b4m') robotics line. It provides the bridge, sensor, and control nodes needed to drive the Yahboom platform under ROS 2." },
      { name: "Math_Arcade", lang: "HTML", stars: 0, category: "Games", url: "https://github.com/speedybits/Math_Arcade",
        desc: "Math Arcade is a set of browser-based educational games for practicing multiplication tables, turning times-table drills into arcade-style play. It runs entirely in the browser with no install." },
      { name: "ha-b4m-addon", lang: "Python", stars: 0, category: "AI & Voice", url: "https://github.com/speedybits/ha-b4m-addon",
        desc: "A Home Assistant add-on that acts as an OpenAI-compatible API shim, translating between Home Assistant's Extended OpenAI Conversation integration and bike4mind's quest-based polling API. It supports streaming responses, tool-calling for device control, session management, automatic date/time context, and proactive 'EXTROVERT' conversations triggered by automations, letting bike4mind's AI drive a smart home." },
      { name: "b4m_turtlebot3", lang: "Python", stars: 0, category: "Robotics", url: "https://github.com/speedybits/b4m_turtlebot3",
        desc: "ROS 2 packages that bring the Bike4Mind assistant to the TurtleBot3 platform, including a bridge node and camera integration, launched via a Vagrant VM and simulation script. Part of the wider Bike4Mind robotics experiments." },
      { name: "Webots_in_docker_demo", lang: "Python", stars: 0, category: "Robotics",
        desc: "A reference project that runs the Webots robot simulator with ROS 2 Humble inside a Docker container, featuring a TurtleBot3 model with a full sensor suite, SLAM mapping, RViz2 visualization, teleoperation, and VNC/noVNC access to the GUI. It's a turnkey way to do containerized robotics simulation without a local Webots install." },
      { name: "Bike4Mind_ROS", lang: "Python", stars: 0, category: "Robotics",
        desc: "An intelligent bicycle-assistant project built on ROS 2 Humble, Webots simulation, and voice interaction. It packages the specification, service model, and Dockerized run environment for a voice-driven robotic bike assistant, an earlier foundation for the later Bike4Mind robotics work." },
      { name: "PokerTetris", lang: "JavaScript", stars: 0, category: "Games", url: "https://github.com/speedybits/PokerTetris",
        desc: "Cardtris is a browser game that mashes up Tetris's falling-block mechanics with poker-hand scoring using a standard 52-card deck. Players place falling cards on a 5x10 board to form winning poker hands, with a level system that ramps up each time you cycle through the deck. Built mobile-first with touch controls." },
      { name: "freetimes", lang: "TypeScript", stars: 0, category: "Web Apps",
        desc: "Free Time Calendar Display is a web app that helps people share their availability from Google Calendar without exposing event details. Users connect multiple calendars (free/busy only), combine them into groups, and generate a shareable page where others browse open days and click into specific free time blocks, updating in real time as calendars change." },
      { name: "InService", lang: "JavaScript", stars: 0, category: "Web Apps", url: "https://github.com/speedybits/InService",
        desc: "InService is a lightweight service-status tracker with a Leaflet map front end and a Firebase backend. It shows location-based service status, lets you toggle a location's status, and supports subscribing to updates: a minimal real-time status board." },
      { name: "mo_landroid", lang: "C++", stars: 0, category: "Robotics",
        desc: "Firmware mods for a Worx Landroid robotic mower, split across two Arduino sketches: a 'PWC' controller that can cut or toggle the perimeter wire, and a robot-side unit adding Wi-Fi control, LiDAR, and Bluetooth keep-out zones. Together they let the mower detect being stuck and enforce virtual boundaries beyond the stock perimeter loop." },
      { name: "PoolControl", lang: "C++", stars: 0, category: "Embedded", url: "https://github.com/speedybits/PoolControl",
        desc: "An Arduino-based pool controller that physically drives an AQL2-SS-RF remote with servos that press its buttons, automating pool filter and cleaning-robot on/off cycles on a timer. The repo also includes FreeCAD models and a 3D-printable mount for the remote and servos." },
      { name: "jetson_mower", lang: "Python", stars: 0, category: "Robotics", url: "https://github.com/speedybits/jetson_mower",
        desc: "An NVIDIA Jetson-powered autonomous mower experiment that uses the Jetson's GPU for vision-based boundary detection and navigation. It includes a boundary-orchestration script and the main mower control loop, built on NVIDIA's sample code." },
      { name: "ArdumowerGPS", lang: "C++", stars: 0, category: "Robotics",
        desc: "GPS enhancements for the open-source Ardumower robotic lawn mower running the Azurit firmware, adding satellite-based positioning to complement the mower's perimeter-wire navigation. Includes supporting Arduino libraries and a ROS integration folder." }
    ];

    // Project date spans: name -> [started (YYYY-MM), last active (YYYY-MM)]
    // Sourced from each repo's GitHub created_at / pushed_at.
    const dates = {
      couchworthy: ["2026-06", "2026-07"], rosiecloud: ["2026-03", "2026-06"],
      clutterbucks: ["2026-02", "2026-06"], escapecall: ["2026-01", "2026-06"],
      casualquest: ["2026-05", "2026-05"], cc_qa: ["2026-04", "2026-04"],
      borderline_web: ["2025-10", "2026-04"], nimbus: ["2026-01", "2026-04"],
      rosie: ["2026-01", "2026-02"], b4m_yahboom: ["2025-05", "2026-01"],
      Math_Arcade: ["2024-10", "2025-11"], "ha-b4m-addon": ["2025-10", "2025-11"],
      b4m_turtlebot3: ["2025-02", "2025-03"], Webots_in_docker_demo: ["2025-01", "2025-01"],
      Bike4Mind_ROS: ["2025-01", "2025-01"], PokerTetris: ["2024-12", "2025-01"],
      freetimes: ["2024-12", "2024-12"], InService: ["2024-11", "2024-11"],
      mo_landroid: ["2024-01", "2024-07"], PoolControl: ["2020-11", "2023-01"],
      jetson_mower: ["2021-09", "2022-08"], ArdumowerGPS: ["2020-12", "2020-12"]
    };
    projects.forEach(p => { const d = dates[p.name]; if (d) { p.started = d[0]; p.active = d[1]; } });

    const langColors = {
      "TypeScript": "#3178c6", "JavaScript": "#f1e05a", "Python": "#3572A5",
      "HTML": "#e34c26", "C++": "#f34b7d", "Other": "#8b949e"
    };

    const grid = document.getElementById('grid');
    const timelineEl = document.getElementById('timeline');
    const yearnavEl = document.getElementById('yearnav');
    const controlsEl = document.querySelector('.controls');
    const filtersEl = document.getElementById('filters');
    const searchEl = document.getElementById('search');
    const countEl = document.getElementById('count');
    const pubCount = projects.filter(p => p.url).length;
    document.getElementById('pubcount').textContent = `${projects.length} projects, ${pubCount} open source.`;

    const cats = ["All", ...Array.from(new Set(projects.map(p => p.category)))];
    let activeCat = "All";

    cats.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (c === "All" ? ' active' : '');
      chip.textContent = c;
      chip.onclick = () => { activeCat = c; document.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x.textContent === c)); render(); };
      filtersEl.appendChild(chip);
    });

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function icon(name) {
      const svgs = {
        star: '<svg class="stars-i" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .59l3.09 6.26 6.91 1-5 4.87 1.18 6.88L12 17.27l-6.18 3.25L7 13.72l-5-4.87 6.91-1z"/></svg>',
      };
      return svgs[name] || '';
    }

    function card(p) {
      const isLink = !!p.url;
      const tag = isLink ? 'a' : 'div';
      const href = isLink ? ` href="${p.url}" target="_blank" rel="noopener"` : '';
      const color = langColors[p.lang] || langColors.Other;
      const badge = isLink ? '' : '<span class="badge">Private</span>';
      const arrow = isLink ? '<span class="arrow">↗</span>' : '';
      const stars = p.stars > 0 ? `<span class="stars">${icon('star')} ${p.stars}</span>` : '';
      return `<${tag} class="card"${href}>
        <div class="card-top">
          <h3>${p.name} ${arrow}</h3>
          ${badge}
        </div>
        <p>${esc(p.desc)}</p>
        <div class="card-foot">
          <span class="lang"><span class="dot" style="background:${color}"></span>${p.lang}</span>
          ${stars}
          <span class="cat-tag">${p.category}</span>
        </div>
      </${tag}>`;
    }

    // ── Timeline helpers ──────────────────────────────────────────
    const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function fmt(ym) { if (!ym) return ''; const [y,m] = ym.split('-'); return MON[+m-1] + ' ' + y; }
    function spanText(p) {
      const a = fmt(p.started), b = fmt(p.active);
      if (!a) return '';
      return (a === b || !b) ? a : a + ' – ' + b;
    }

    // Keep the sticky year-nav docked to the bottom of the (variable-height) controls bar.
    function positionYearnav() { yearnavEl.style.top = (controlsEl ? controlsEl.offsetHeight : 0) + 'px'; }
    function stickyOffset() {
      return (controlsEl ? controlsEl.offsetHeight : 0) + (view === 'timeline' ? yearnavEl.offsetHeight : 0);
    }
    function jumpToYear(year) {
      const el = document.getElementById('yr-' + year);
      if (!el) return;
      const top = el.getBoundingClientRect().top + window.scrollY - stickyOffset() - 12;
      window.scrollTo({ top, behavior: 'smooth' });
    }

    function tlItem(p) {
      const isLink = !!p.url;
      const tag = isLink ? 'a' : 'div';
      const href = isLink ? ` href="${p.url}" target="_blank" rel="noopener"` : '';
      const color = langColors[p.lang] || langColors.Other;
      const badge = isLink ? '' : '<span class="badge">Private</span>';
      const arrow = isLink ? '<span class="arrow">↗</span>' : '';
      const stars = p.stars > 0 ? `<span class="stars">${icon('star')} ${p.stars}</span>` : '';
      return `<div class="tl-item">
        <div class="tl-date">${spanText(p)}</div>
        <${tag} class="card tl-card"${href}>
          <div class="card-top"><h3>${p.name} ${arrow}</h3>${badge}</div>
          <p>${esc(p.desc)}</p>
          <div class="card-foot">
            <span class="lang"><span class="dot" style="background:${color}"></span>${p.lang}</span>
            ${stars}<span class="cat-tag">${p.category}</span>
          </div>
        </${tag}>
      </div>`;
    }

    let tlObserver, yearObserver;
    function observeTimeline() {
      if (!('IntersectionObserver' in window)) {
        timelineEl.querySelectorAll('.tl-item').forEach(el => el.classList.add('in'));
        return;
      }
      if (tlObserver) tlObserver.disconnect();
      tlObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); tlObserver.unobserve(e.target); } });
      }, { rootMargin: '0px 0px -8% 0px' });
      timelineEl.querySelectorAll('.tl-item').forEach(el => tlObserver.observe(el));

      if (yearObserver) yearObserver.disconnect();
      yearObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const y = e.target.dataset.year;
            yearnavEl.querySelectorAll('.yr-pill').forEach(pl => pl.classList.toggle('active', pl.dataset.year === y));
          }
        });
      }, { rootMargin: '-90px 0px -70% 0px' });
      timelineEl.querySelectorAll('.tl-year-group').forEach(el => yearObserver.observe(el));
    }

    function renderTimeline(list) {
      if (!list.length) { timelineEl.innerHTML = '<div class="empty">No projects match your search.</div>'; yearnavEl.innerHTML = ''; return; }
      const sorted = [...list].sort((a, b) => (b.started || '').localeCompare(a.started || ''));
      const groups = {};
      sorted.forEach(p => { const y = (p.started || '????').slice(0,4); (groups[y] = groups[y] || []).push(p); });
      const years = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      yearnavEl.innerHTML = years.map(y => `<div class="yr-pill" data-year="${y}">${y}</div>`).join('');
      timelineEl.innerHTML = years.map(y => `
        <section class="tl-year-group" id="yr-${y}" data-year="${y}">
          <div class="tl-year">
            <span class="yr">${y}</span>
            <span class="yr-count">${groups[y].length} project${groups[y].length > 1 ? 's' : ''}</span>
            <span class="yr-line"></span>
          </div>
          ${groups[y].map(tlItem).join('')}
        </section>`).join('');

      yearnavEl.querySelectorAll('.yr-pill').forEach(pill => {
        pill.onclick = () => jumpToYear(pill.dataset.year);
      });
      positionYearnav();
      observeTimeline();
    }

    // ── Main render ───────────────────────────────────────────────
    let view = 'grid';
    function render() {
      const q = searchEl.value.trim().toLowerCase();
      const list = projects.filter(p => {
        const matchCat = activeCat === "All" || p.category === activeCat;
        const matchQ = !q || (p.name + ' ' + p.desc + ' ' + p.lang + ' ' + p.category).toLowerCase().includes(q);
        return matchCat && matchQ;
      });
      countEl.textContent = `// showing ${list.length} of ${projects.length}`;
      if (view === 'grid') {
        grid.innerHTML = list.length ? list.map(card).join('') : '<div class="empty">No projects match your search.</div>';
      } else {
        renderTimeline(list);
      }
    }

    document.getElementById('viewToggle').addEventListener('click', (e) => {
      const btn = e.target.closest('.vt-btn');
      if (!btn) return;
      view = btn.dataset.view;
      document.querySelectorAll('.vt-btn').forEach(b => {
        const on = b === btn;
        b.classList.toggle('active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      const tl = view === 'timeline';
      grid.hidden = tl; timelineEl.hidden = !tl; yearnavEl.hidden = !tl;
      render();
      if (tl) positionYearnav();
    });

    let resizeRAF;
    window.addEventListener('resize', () => {
      cancelAnimationFrame(resizeRAF);
      resizeRAF = requestAnimationFrame(() => { if (view === 'timeline') positionYearnav(); });
    });

    searchEl.addEventListener('input', render);
    render();
  </script>
</body>
</html>
